<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>0sint_CX - Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }

        .terminal-scroll::-webkit-scrollbar {
            width: 3px;
        }

        .cyber-bg {
            background-color: #020617;
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        }

        body {
            overscroll-behavior-y: none;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen font-sans antialiased" x-data="dashboardApp()">

    <div x-show="!isLoggedIn" class="fixed inset-0 z-50 flex items-center justify-center cyber-bg px-4">
        <div
            class="bg-slate-900 p-8 md:p-10 rounded-3xl border border-slate-800 shadow-2xl w-full max-w-md relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-blue-600"></div>

            <div class="text-center mb-8">
                <i class="fa fa-fingerprint text-5xl text-blue-500 mb-4 animate-pulse"></i>
                <h1 class="text-3xl font-black text-white tracking-tighter italic">0sintCX</h1>
                <p class="text-xs font-mono text-slate-500 mt-2 tracking-widest uppercase">Restricted Access</p>
            </div>

            <div x-show="loginError"
                class="bg-red-900/30 border border-red-800 text-red-400 text-xs text-center py-2 rounded-lg mb-4 font-mono"
                x-text="loginError" x-transition></div>

            <form @submit.prevent="handleLogin" class="space-y-5">
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase font-bold mb-1">Operator ID</label>
                    <div class="relative">
                        <i class="fa fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="text" x-model="loginData.username" required
                            class="w-full bg-slate-950 border border-slate-800 py-3 pl-12 pr-4 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none text-white font-mono transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 uppercase font-bold mb-1">Passcode</label>
                    <div class="relative">
                        <i class="fa fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="password" x-model="loginData.password" required
                            class="w-full bg-slate-950 border border-slate-800 py-3 pl-12 pr-4 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none text-white font-mono transition-all">
                    </div>
                </div>
                <button type="submit" :disabled="isLoggingIn"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 mt-4 cursor-pointer relative z-10">
                    <i x-show="isLoggingIn" class="fa fa-circle-notch fa-spin"></i>
                    <span x-text="isLoggingIn ? 'AUTHENTICATING...' : 'AUTHORIZE ACCESS'"></span>
                </button>
            </form>
        </div>
    </div>

    <div x-show="isLoggedIn" style="display: none;" class="pb-10">

        <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-40 shadow-2xl">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">

                <div class="w-full md:w-auto flex justify-between items-center">
                    <div>
                        <h1 class="text-xl md:text-2xl font-black text-blue-500 tracking-tighter italic">0sintCX
                            <span class="text-white uppercase">OSINT</span>
                        </h1>
                        <p class="text-[9px] md:text-[10px] text-slate-500 font-mono flex items-center gap-2 mt-1">
                            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                            SECURE CONNECT
                        </p>
                    </div>

                    <div class="flex md:hidden gap-2">
                        <button @click="downloadJSON()"
                            class="bg-slate-800 text-blue-400 hover:bg-blue-600 hover:text-white w-10 h-10 rounded-xl flex items-center justify-center transition-all shadow-lg">
                            <i class="fa fa-download"></i>
                        </button>
                        <button @click="logout()"
                            class="bg-slate-800 text-red-400 hover:bg-red-600 hover:text-white w-10 h-10 rounded-xl flex items-center justify-center transition-all shadow-lg">
                            <i class="fa fa-power-off"></i>
                        </button>
                    </div>
                </div>

                <div class="w-full md:w-auto flex items-center gap-3">
                    <div class="relative w-full md:w-80 lg:w-96">
                        <i class="fa fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <input type="text" x-model.debounce.500ms="searchQuery" @input="resetLimit()"
                            placeholder="Cari Target..."
                            class="w-full bg-slate-950 border border-slate-800 py-2.5 md:py-3 pl-10 pr-4 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none text-white font-mono text-sm transition-all">
                    </div>

                    <div class="hidden md:flex gap-3">
                        <button @click="downloadJSON()"
                            class="bg-slate-800 text-blue-400 hover:bg-blue-600 hover:text-white px-4 py-3 rounded-xl font-black transition-all shadow-lg text-sm flex items-center gap-2">
                            <i class="fa fa-download"></i> JSON
                        </button>
                        <button @click="logout()"
                            class="bg-slate-800 text-red-400 hover:bg-red-600 hover:text-white px-4 py-3 rounded-xl font-black transition-all shadow-lg text-sm flex items-center gap-2">
                            <i class="fa fa-power-off"></i> LOGOUT
                        </button>
                    </div>
                </div>

            </div>
        </nav>

        <div class="p-4 md:p-6 lg:p-10 max-w-7xl mx-auto space-y-6 md:space-y-8">

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 md:gap-6">
                <div
                    class="bg-slate-900 p-5 rounded-2xl md:rounded-3xl border border-slate-800 shadow-xl col-span-1 flex flex-col justify-center">
                    <p
                        class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-4 flex items-center gap-2">
                        <i class="fa fa-server"></i> Azure Telemetry
                    </p>
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-[10px] mb-1 font-mono text-blue-400"><span>CPU
                                    LOAD</span><span x-text="sys.cpu + '%'"></span></div>
                            <div class="w-full bg-slate-950 rounded-full h-2">
                                <div class="bg-blue-500 h-2 rounded-full transition-all duration-500"
                                    :style="`width: ${sys.cpu}%`"></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex justify-between text-[10px] mb-1 font-mono text-purple-400"><span>RAM
                                    USAGE</span><span x-text="sys.ram + '%'"></span></div>
                            <div class="w-full bg-slate-950 rounded-full h-2">
                                <div class="bg-purple-500 h-2 rounded-full transition-all duration-500"
                                    :style="`width: ${sys.ram}%`"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div
                    class="bg-gradient-to-br from-slate-900 to-blue-900/20 p-5 rounded-2xl md:rounded-3xl border border-blue-800/50 shadow-xl col-span-1 text-center flex flex-col justify-center relative overflow-hidden">
                    <div class="absolute -right-4 -bottom-4 opacity-10 text-8xl"><i class="fa fa-bullseye"></i></div>
                    <p class="text-[10px] text-blue-400 uppercase font-bold tracking-widest mb-2 relative z-10">Coverage
                        Score</p>
                    <div class="flex items-baseline justify-center gap-1 relative z-10">
                        <p class="text-4xl md:text-5xl font-black text-white"
                            x-text="((stats.total / 142292) * 100).toFixed(2)"></p>
                        <span class="text-lg font-bold text-green-500">%</span>
                    </div>
                    <p class="text-[9px] text-slate-400 mt-2 relative z-10 font-mono">TARGET: 142,292</p>
                </div>

                <div
                    class="bg-black p-4 rounded-2xl md:rounded-3xl border border-slate-800 shadow-xl col-span-1 lg:col-span-2 relative flex flex-col">
                    <div class="w-full h-6 border-b border-slate-800/50 flex items-center px-2 gap-2 mb-2">
                        <div class="w-2 h-2 rounded-full bg-red-500"></div>
                        <div class="w-2 h-2 rounded-full bg-yellow-500"></div>
                        <div class="w-2 h-2 rounded-full bg-green-500"></div>
                        <span class="text-[9px] text-slate-500 font-mono ml-2">azure@root: ~/miner.log</span>
                    </div>
                    <div
                        class="flex-1 h-24 md:h-28 overflow-y-auto font-mono text-[10px] md:text-xs terminal-scroll flex flex-col justify-end">
                        <template x-for="(log, index) in sys.logs" :key="index">
                            <div class="flex gap-2 text-slate-400 mb-1"><span class="text-green-500">></span><span
                                    x-text="log" class="break-all"></span></div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-6 text-center">
                <div class="bg-slate-900 p-4 md:p-5 rounded-2xl border border-slate-800 shadow-lg">
                    <p class="text-[9px] text-slate-500 uppercase font-bold mb-1">Found Target</p>
                    <p class="text-2xl md:text-3xl font-black text-white" x-text="stats.total">0</p>
                </div>
                <div
                    class="bg-slate-900 p-4 md:p-5 rounded-2xl border border-slate-800 shadow-lg border-b-2 border-green-500">
                    <p class="text-[9px] text-green-500 uppercase font-bold mb-1">PNS / ASN</p>
                    <p class="text-2xl md:text-3xl font-black text-green-400" x-text="stats.pns">0</p>
                </div>
                <div
                    class="bg-slate-900 p-4 md:p-5 rounded-2xl border border-slate-800 shadow-lg border-b-2 border-purple-500">
                    <p class="text-[9px] text-purple-500 uppercase font-bold mb-1">Wirausaha</p>
                    <p class="text-2xl md:text-3xl font-black text-purple-400" x-text="stats.wirausaha">0</p>
                </div>
                <div
                    class="bg-slate-900 p-4 md:p-5 rounded-2xl border border-slate-800 shadow-lg border-b-2 border-blue-500">
                    <p class="text-[9px] text-blue-500 uppercase font-bold mb-1">Private Sector</p>
                    <p class="text-2xl md:text-3xl font-black text-blue-400" x-text="stats.swasta">0</p>
                </div>
            </div>

            <div x-show="!loading" class="flex gap-2 md:gap-4 overflow-x-auto pb-2 scrollbar-hide">
                <button @click="setFilter('all')"
                    :class="activeFilter === 'all' ? 'bg-blue-600 text-white shadow-blue-500/30' : 'bg-slate-900 text-slate-400 border border-slate-800 hover:bg-slate-800'"
                    class="px-5 py-2.5 rounded-xl font-bold text-[10px] md:text-xs tracking-widest uppercase whitespace-nowrap transition-all shadow-lg flex items-center gap-2">
                    <i class="fa fa-users"></i> Semua Data
                </button>
                <button @click="setFilter('medsos')"
                    :class="activeFilter === 'medsos' ? 'bg-gradient-to-r from-pink-600 to-purple-600 text-white shadow-pink-500/30' : 'bg-slate-900 text-slate-400 border border-slate-800 hover:bg-slate-800'"
                    class="px-5 py-2.5 rounded-xl font-bold text-[10px] md:text-xs tracking-widest uppercase whitespace-nowrap transition-all shadow-lg flex items-center gap-2">
                    <i class="fas fa-link"></i> Jejak Digital Valid
                </button>
            </div>
            <div x-show="loading && alumni.length === 0" class="text-center py-10">
                <i class="fa fa-circle-notch fa-spin text-3xl text-blue-500 mb-3"></i>
                <p class="text-sm font-mono text-slate-400">Syncing Azure Data...</p>
            </div>

            <div x-show="!loading || alumni.length > 0">
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6">
                    <template x-for="h in paginatedAlumni" :key="h.nim">
                        <div
                            class="bg-slate-900 p-5 md:p-6 rounded-2xl md:rounded-3xl border border-slate-800 flex flex-col justify-between shadow-xl hover:border-blue-500/50 transition-colors">

                            <div>
                                <div class="flex justify-between items-start mb-3 md:mb-4">
                                    <span
                                        :class="{ 'bg-green-900/30 text-green-400 border-green-800': h.kategori === 'PNS', 'bg-purple-900/30 text-purple-400 border-purple-800': h.kategori === 'Wirausaha', 'bg-blue-900/30 text-blue-400 border-blue-800': h.kategori === 'Swasta' }"
                                        class="text-[10px] md:text-xs font-black px-2 md:px-3 py-1 rounded-full border uppercase tracking-widest"
                                        x-text="h.kategori"></span>
                                    <span
                                        class="text-[9px] md:text-[10px] font-mono text-slate-500 bg-slate-950 px-2 py-1 rounded-md border border-slate-800"
                                        x-text="h.last_updated"></span>
                                </div>

                                <div class="font-black text-white text-lg md:text-xl mb-1 leading-tight"
                                    x-text="h.nama"></div>
                                <div class="text-[9px] md:text-[10px] text-blue-400 font-mono mb-3 bg-blue-900/20 inline-block px-2 py-1 rounded border border-blue-900/50 truncate max-w-full"
                                    x-text="h.nim + ' | ' + h.prodi"></div>
                                <div class="text-xs md:text-sm text-slate-300 italic line-clamp-2 mb-4 leading-relaxed h-10"
                                    x-text="h.posisi"></div>

                                <div class="grid grid-cols-1 gap-2 mb-4 md:mb-5">
                                    <div
                                        class="flex items-center gap-3 bg-slate-950 p-2 rounded-xl border border-slate-800">
                                        <div
                                            class="w-7 h-7 md:w-8 md:h-8 rounded-lg bg-blue-900/30 text-blue-400 flex items-center justify-center text-xs">
                                            <i class="fa fa-envelope"></i>
                                        </div>
                                        <span class="text-[10px] md:text-xs font-mono text-slate-300 truncate"
                                            x-text="h.email || '-'"></span>
                                    </div>
                                    <div
                                        class="flex items-center gap-3 bg-slate-950 p-2 rounded-xl border border-slate-800">
                                        <div
                                            class="w-7 h-7 md:w-8 md:h-8 rounded-lg bg-green-900/30 text-green-400 flex items-center justify-center text-xs">
                                            <i class="fa fa-phone"></i>
                                        </div>
                                        <span class="text-[10px] md:text-xs font-mono text-slate-300 truncate"
                                            x-text="h.no_hp || '-'"></span>
                                    </div>
                                </div>
                            </div>

                            <div
                                class="p-4 md:p-5 bg-slate-950 rounded-xl md:rounded-2xl border border-slate-800 relative overflow-hidden">
                                <div class="absolute -right-2 -top-2 opacity-5 text-5xl md:text-6xl"><i
                                        class="fa fa-building"></i></div>
                                <p
                                    class="text-[9px] md:text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-2 md:mb-3 border-b border-slate-800 pb-2">
                                    Corporate Intel</p>

                                <div x-show="h.tempat_bekerja && h.tempat_bekerja !== '-'">
                                    <p class="text-sm md:text-base text-blue-400 font-black truncate"
                                        x-text="h.tempat_bekerja"></p>
                                    <p class="text-[9px] md:text-xs text-slate-400 mt-1 line-clamp-2 leading-relaxed"
                                        x-text="h.alamat_bekerja"></p>
                                    <div class="mt-3 md:mt-4" x-show="h.company_ig && h.company_ig.startsWith('http')">
                                        <a :href="h.company_ig" target="_blank"
                                            class="inline-flex items-center gap-2 text-[9px] md:text-[10px] bg-gradient-to-r from-pink-600 to-purple-600 text-white px-3 md:px-4 py-2 rounded-lg shadow-lg hover:opacity-80 transition uppercase font-black tracking-widest w-full justify-center relative z-10"><i
                                                class="fab fa-instagram text-sm"></i> Official Corp IG</a>
                                    </div>
                                </div>
                                <div x-show="!h.tempat_bekerja || h.tempat_bekerja === '-'"
                                    class="text-[10px] md:text-xs text-slate-600 font-mono italic">Instansi belum
                                    teridentifikasi.</div>
                            </div>

                            <div
                                class="mt-4 md:mt-6 pt-4 md:pt-5 border-t border-slate-800 flex justify-center gap-3 relative z-10">
                                <a :href="h.linkedin" target="_blank"
                                    :class="h.linkedin && h.linkedin.startsWith('http') ? 'bg-blue-600 shadow-blue-500/30' : 'hidden'"
                                    class="w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center text-white text-lg md:text-xl shadow-lg transition active:scale-95"><i
                                        class="fab fa-linkedin"></i></a>
                                <a :href="h.instagram" target="_blank"
                                    :class="h.instagram && h.instagram.startsWith('http') ? 'bg-gradient-to-tr from-yellow-500 via-pink-500 to-purple-600 shadow-pink-500/30' : 'hidden'"
                                    class="w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center text-white text-lg md:text-xl shadow-lg transition active:scale-95"><i
                                        class="fab fa-instagram"></i></a>
                                <span
                                    x-show="(!h.linkedin || !h.linkedin.startsWith('http')) && (!h.instagram || !h.instagram.startsWith('http'))"
                                    class="text-[10px] md:text-xs text-slate-600 italic">No personal footprint</span>
                            </div>

                        </div>
                    </template>
                </div>

                <div x-show="filteredAlumni.length > displayLimit" class="mt-8 text-center">
                    <button @click="loadMore()"
                        class="bg-slate-800 border border-slate-700 hover:bg-slate-700 text-slate-300 font-mono text-xs md:text-sm px-6 py-3 rounded-xl transition-all shadow-lg flex items-center gap-2 mx-auto">
                        <i class="fa fa-angle-down"></i> Load More Data (<span
                            x-text="filteredAlumni.length - displayLimit"></span> remaining)
                    </button>
                </div>

                <div x-show="filteredAlumni.length === 0 && !loading" class="text-center py-10">
                    <i class="fa fa-folder-open text-4xl text-slate-700 mb-3"></i>
                    <p class="text-slate-500 font-mono text-sm">Tidak ada target yang cocok dengan filter ini.</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        function dashboardApp() {
            return {
                alumni: [],
                searchQuery: '',
                loading: false,
                displayLimit: 30,
                activeFilter: 'all',
                stats: { total: 0, pns: 0, wirausaha: 0, swasta: 0 },
                sys: { cpu: 0, ram: 0, logs: [] },
                isLoggedIn: false,
                loginData: { username: '', password: '' },
                isLoggingIn: false,
                loginError: '',
                token: null,
                timeoutInMinutes: 10,
                patrolInterval: null,

                async init() {
                    const savedToken = localStorage.getItem('osint_token');
                    if (savedToken) {
                        this.token = savedToken;
                        this.isLoggedIn = true;
                        this.startApp();
                    }
                },

                async handleLogin() {
                    this.isLoggingIn = true;
                    this.loginError = '';
                    try {
                        const res = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.loginData)
                        });

                        const data = await res.json();

                        if (res.ok) {
                            this.token = data.token;
                            localStorage.setItem('osint_token', this.token);
                            this.isLoggedIn = true;
                            this.loginData = { username: '', password: '' };
                            this.startApp();
                        } else {
                            this.loginError = data.message || "Akses ditolak!";
                        }
                    } catch (err) {
                        this.loginError = "Gagal terhubung ke server Azure.";
                    } finally {
                        this.isLoggingIn = false;
                    }
                },

                logout() {
                    localStorage.removeItem('osint_token');
                    localStorage.removeItem('osint_last_active');
                    this.isLoggedIn = false;
                    this.token = null;
                    this.alumni = [];
                    clearInterval(this.patrolInterval);
                    window.location.reload();
                },

                startApp() {
                    this.loading = true;
                    this.fetchData();
                    this.fetchTelemetry();

                    setInterval(() => { if (this.searchQuery === '' && this.isLoggedIn) this.fetchData(); }, 10000);
                    setInterval(() => { if (this.isLoggedIn) this.fetchTelemetry(); }, 2000);

                    this.updateLastActivity();
                    const events = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'];
                    events.forEach(evt => document.addEventListener(evt, () => this.updateLastActivity(), { passive: true }));

                    this.patrolInterval = setInterval(() => { this.checkInactivity(); }, 5000);
                },

                updateLastActivity() {
                    if (!this.isLoggedIn) return;
                    localStorage.setItem('osint_last_active', Date.now().toString());
                },

                checkInactivity() {
                    if (!this.isLoggedIn) return;
                    const lastActive = parseInt(localStorage.getItem('osint_last_active') || '0');
                    const diffMinutes = (Date.now() - lastActive) / (1000 * 60);
                    if (diffMinutes >= this.timeoutInMinutes) {
                        console.log("Auto-logout: AFK timeout.");
                        this.logout();
                    }
                },

                async fetchTelemetry() {
                    if (!this.token) return;
                    try {
                        const res = await fetch('/api/telemetry', { headers: { 'X-OSINT-Token': this.token } });
                        if (res.status === 401) return this.logout();
                        this.sys = await res.json();
                    } catch (err) { }
                },

                async fetchData() {
                    if (!this.token) return;
                    try {
                        const res = await fetch('/api/alumni', { headers: { 'X-OSINT-Token': this.token } });
                        if (res.status === 401) return this.logout();
                        const data = await res.json();
                        this.alumni = data;
                        this.calculateStats();
                    } catch (err) { }
                    finally { this.loading = false; }
                },

                calculateStats() {
                    this.stats.total = this.alumni.length;
                    this.stats.pns = this.alumni.filter(a => a.kategori === 'PNS').length;
                    this.stats.wirausaha = this.alumni.filter(a => a.kategori === 'Wirausaha').length;
                    this.stats.swasta = this.alumni.filter(a => a.kategori === 'Swasta').length;
                },

                setFilter(type) {
                    this.activeFilter = type;
                    this.resetLimit();
                },

                get filteredAlumni() {
                    let result = this.alumni;

                    if (this.searchQuery !== '') {
                        const q = this.searchQuery.toLowerCase();
                        result = result.filter(a =>
                            (a.nama?.toLowerCase().includes(q)) ||
                            (a.nim?.toLowerCase().includes(q)) ||
                            (a.tempat_bekerja?.toLowerCase().includes(q))
                        );
                    }

                    if (this.activeFilter === 'medsos') {
                        result = result.filter(a =>
                            (a.linkedin && a.linkedin.startsWith('http')) ||
                            (a.instagram && a.instagram.startsWith('http')) ||
                            (a.company_ig && a.company_ig.startsWith('http'))
                        );
                    }

                    return result;
                },

                get paginatedAlumni() {
                    return this.filteredAlumni.slice(0, this.displayLimit);
                },

                resetLimit() {
                    this.displayLimit = 30;
                },

                loadMore() {
                    this.displayLimit += 30;
                },

                downloadJSON() {
                    const dataToDownload = this.filteredAlumni;

                    if (dataToDownload.length === 0) {
                        alert("Gagal download: Tidak ada data yang sesuai filter/pencarian.");
                        return;
                    }

                    const dataStr = JSON.stringify(dataToDownload, null, 4);
                    const blob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement("a");
                    link.href = url;

                    const filterName = this.activeFilter === 'medsos' ? 'VALID_FOOTPRINT' : 'ALL_DATA';
                    link.download = `OSINT_${filterName}_${new Date().getTime()}.json`;

                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                }
            }
        }
    </script>
</body>

</html>
